<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP JavaScript - Générateur de Mots de Passe</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            color: #00d9ff;
        }

        .iterations {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .iterations button {
            background: #0f3460;
            color: white;
            border: 1px solid #00d9ff;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .iterations button:hover {
            background: #00d9ff;
            color: #1a1a2e;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Colonne de gauche : code */
        .code-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #0f3460;
        }

        .zone-label {
            background: #16213e;
            padding: 10px 15px;
            font-size: 14px;
            color: #aaa;
            border-bottom: 1px solid #0f3460;
        }

        #editeur {
            flex: 1;
            width: 100%;
            background: #0d1b2a;
            color: #a5d6ff;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .actions {
            padding: 10px;
            background: #16213e;
            display: flex;
            gap: 10px;
        }

        .actions button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .actions button:hover {
            background: #ff6b6b;
        }

        .actions .btn-secondaire {
            background: #0f3460;
        }

        /* Colonne de droite : résultat */
        .output-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
        }

        #sortie {
            flex: 1;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #d4d4d4;
        }

        #sortie .log { color: #d4d4d4; }
        #sortie .error { color: #ff6b6b; }
        #sortie .info { color: #a0d468; }

        footer {
            background: #16213e;
            padding: 8px 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        @media (max-width: 900px) {
            main { flex-direction: column; }
            .code-zone { border-right: none; border-bottom: 2px solid #0f3460; }
            .iterations { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 TP JavaScript - Générateur de MDP</h1>
        <div class="iterations">
            <button onclick="chargerIteration(1)">It. 1</button>
            <button onclick="chargerIteration(2)">It. 2</button>
            <button onclick="chargerIteration(3)">It. 3</button>
            <button onclick="chargerIteration(4)">It. 4</button>
            <button onclick="chargerIteration(5)">It. 5</button>
            <button onclick="chargerIteration(6)">It. 6</button>
            <button onclick="chargerIteration(7)">It. 7</button>
            <button onclick="chargerIteration(8)">It. 8</button>
            <button onclick="chargerIteration(9)">It. 9</button>
            <button onclick="chargerIteration(10)">It. 10</button>
            <button onclick="chargerIteration(11)">It. 11</button>
        </div>
    </header>

    <main>
        <section class="code-zone">
            <div class="zone-label">✏️ Écris ton code JavaScript ici</div>
            <textarea id="editeur" spellcheck="false" placeholder="// Clique sur une itération en haut pour commencer, puis appuie sur Run"></textarea>
            <div class="actions">
                <button onclick="executerCode()">▶️ Run</button>
                <button class="btn-secondaire" onclick="effacerSortie()">🗑️ Effacer</button>
            </div>
        </section>

        <section class="output-zone">
            <div class="zone-label">📺 Résultat / Console</div>
            <div id="sortie"></div>
        </section>
    </main>

    <footer>Console intégrée : console.log() s'affiche ici → pas besoin d'ouvrir la console du navigateur</footer>

    <script>
        // ============================================================
        // CONTENU DE CHAQUE ITÉRATION (départ pour les élèves)
        // ============================================================
        const iterations = {
            1: `// Itération 1 : Bonjour le monde

console.log("Je vais apprendre JavaScript");`,

        };

        // ============================================================
        // GESTION DE L'ÉDITEUR
        // ============================================================
        const editeur = document.getElementById("editeur");
        const sortie = document.getElementById("sortie");

        function chargerIteration(numero) {
            editeur.value = iterations[numero];
            effacerSortie();
            ecrireLigne("info", "Itération " + numero + " chargée. Clique sur Run.");
        }

        function effacerSortie() {
            sortie.innerHTML = "";
        }

        function ecrireLigne(classe, texte) {
            let ligne = document.createElement("div");
            ligne.className = classe;
            ligne.textContent = texte;
            sortie.appendChild(ligne);
            sortie.scrollTop = sortie.scrollHeight;
        }

        // ============================================================
        // EXÉCUTION DU CODE AVEC CONSOLE.REDIRIGÉE
        // ============================================================
        function executerCode() {
            effacerSortie();

            let code = editeur.value;
            if (!code.trim()) {
                ecrireLigne("error", "L'éditeur est vide. Choisis une itération.");
                return;
            }

            // On crée une fausse console qui affiche dans la page
            let fakeConsole = {
                log: function(...args) {
                    ecrireLigne("log", args.map(a => String(a)).join(" "));
                },
                error: function(...args) {
                    ecrireLigne("error", args.map(a => String(a)).join(" "));
                },
                warn: function(...args) {
                    ecrireLigne("error", "WARN: " + args.map(a => String(a)).join(" "));
                }
            };

            try {
                // new Function permet d'exécuter le code comme une fonction
                let fn = new Function("console", code);
                fn(fakeConsole);
            } catch (erreur) {
                ecrireLigne("error", "❌ Erreur : " + erreur.message);
            }
        }

        // Raccourci clavier Ctrl+Enter pour exécuter
        editeur.addEventListener("keydown", function(event) {
            if (event.ctrlKey && event.key === "Enter") {
                executerCode();
            }
        });

        // Charger l'itération 1 au démarrage
        chargerIteration(1);
    </script>
</body>
</html>
