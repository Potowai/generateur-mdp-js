<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP — Générateur de MDP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --card-hover: #27272a;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #fafafa;
            --primary-foreground: #18181b;
            --ok: #22c55e;
            --err: #ef4444;
            --radius: 0.5rem;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            background: var(--bg);
        }
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            color: var(--text);
        }
        select {
            padding: 8px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 14px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
        }
        button {
            background: var(--primary);
            color: var(--primary-foreground);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background .15s, opacity .15s;
        }
        button:hover { opacity: 0.9; }
        .saved { font-size: 12px; color: var(--ok); opacity: 0; transition: opacity .3s; }
        .saved.show { opacity: 1; }
        main { display: flex; flex: 1; min-height: 0; }
        aside {
            width: 320px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .mission {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .mission h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 10px;
            color: var(--text);
        }
        .mission p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--muted);
            margin: 0;
        }
        .mission strong { color: var(--text); }
        .mission code {
            background: var(--card-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .progress {
            padding: 16px 20px;
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 5px;
        }
        .dot {
            height: 6px;
            border-radius: 3px;
            background: var(--border);
        }
        .dot.done { background: var(--ok); }
        .editor-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        textarea {
            flex: 1;
            padding: 18px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 14px;
            border: none;
            resize: none;
            outline: none;
            background: #0c0c0e;
            color: #e4e4e7;
            line-height: 1.55;
        }
        .toolbar {
            padding: 10px 16px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .toolbar button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .toolbar button:hover { background: var(--card-hover); }
        .output-wrap {
            width: 360px;
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .output-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        #out {
            flex: 1;
            padding: 18px;
            overflow: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            color: var(--text);
        }
        #out div { margin-bottom: 6px; }
        #out .err { color: var(--err); }
        #out .ok { color: var(--ok); font-weight: 600; }
        #out .info { color: var(--muted); font-style: italic; }

        .success-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity .3s;
            background: rgba(0,0,0,.6);
        }
        .success-overlay.show { opacity: 1; }
        .success-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 44px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
            transform: scale(0.95);
            transition: transform .25s ease-out;
        }
        .success-overlay.show .success-card { transform: scale(1); }
        .success-card .check {
            width: 64px;
            height: 64px;
            background: var(--ok);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--primary-foreground);
        }
        .success-card h3 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 6px;
            color: var(--text);
        }
        .success-card p { margin: 0; color: var(--muted); font-size: 14px; }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 1999;
            pointer-events: none;
            animation: confetti-fall 2.2s ease-out forwards;
        }

        @media (max-width: 900px) {
            aside, .output-wrap { width: 100%; }
            main { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">JS Academy — Générateur de MDP</div>
    <select id="it" onchange="loadIt(this.value)"></select>
    <button onclick="run()">▶ Run</button>
    <span class="saved" id="saved">Code sauvegardé ✓</span>
</header>

<main>
    <aside>
        <div class="mission" id="mission">
            <h2 id="m-title">Bienvenue</h2>
            <p id="m-text">Choisis une itération pour commencer.</p>
        </div>
        <div class="progress" id="progress"></div>
    </aside>

    <div class="editor-wrap">
        <textarea id="code" spellcheck="false"></textarea>
        <div class="toolbar">
            <button onclick="resetIt()">↻ Reset</button>
            <button onclick="clearOut()">Effacer sortie</button>
            <button onclick="saveCurrent()" class="btn-save">💾 Sauvegarder</button>
            <span style="color:#fff;font-size:12px;margin-left:auto;">Ctrl+Enter pour exécuter</span>
        </div>
    </div>

    <div class="output-wrap">
        <div class="output-head">Console</div>
        <div id="out"></div>
    </div>
</main>

<div class="success-overlay" id="success">
    <div class="success-card">
        <div class="check">✓</div>
        <h3>Mission réussie !</h3>
        <p id="success-text">Passe à l'itération suivante.</p>
    </div>
</div>

<script>
const baseCode = {
    1: `// Exemple :
console.log("hello world!");

// Mission : affiche "Salut + ton prénom !"
// Écris ton code ci-dessous :
`,

    2: `// Mission : crée une variable et affiche-la
// 1. Crée une variable nom qui contient "JS Academy"
// 2. Affiche-la avec console.log
`,

    3: `// Mission : utilise les lettres du tableau pour former le mot "ace"
let lettres = ["a", "b", "c", "d", "e"];
// Exemple : lettres[0] affiche la première lettre, lettres[1] la deuxième
// Utilise lettres[?] pour afficher "ace"
`,

    4: `// Mission : affiche les nombres de 1 à 5 avec une boucle
// Complète la boucle for ci-dessous :
for (let i = 1; i <= 5; i++) {
    // écris ici
}
`,

    5: `// Mission : nombre au hasard entre 10 et 20
// On te donne la fonction magique : randomInt(min, max) 
// Elle donne un nombre aléatoire entre le min et le max
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Change les nombres ci-dessous pour obtenir un nombre entre 10 et 20
console.log("Nombre aléatoire : " + randomInt(1, 6));
`,

    6: `// Mission : découvre les conditions if / else
let age = 14;

// Complète le if pour afficher "majeur" si age est 18 ou plus, sinon "mineur"
if (age >= 18) {
    console.log("majeur");
} else {
    console.log("mineur");
}
`,

    7: `// Mission : génère un mot de passe de 6 lettres minuscules
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let alphabet = "abcdefghijklmnopqrstuvwxyz";
let mdp = "";
// Ajoute une boucle for ici

console.log(mdp);
`,

    8: `// Mission : mot de passe avec minuscules ET majuscules
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let minuscules = "abcdefghijklmnopqrstuvwxyz";
let majuscules = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let mdp = "";

// Boucle de 8 tours : si random < 0.5 prend une minuscule, sinon une majuscule
for (let i = 0; i < 8; i++) {
    if (Math.random() < 0.5) {
        mdp += minuscules[randomInt(0, minuscules.length - 1)];
    } else {
        mdp += majuscules[randomInt(0, majuscules.length - 1)];
    }
}
console.log(mdp);
`,

    9: `// Mission : mot de passe avec tous les types de caractères
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
let mdp = "";
// Boucle de 12 tours

console.log(mdp);
`,

    10: `// Mission : modifie la zone de droite avec du HTML
// Utilise document.getElementById("out") pour changer le contenu
`,

    11: `// Mission : génère deux mots de passe avec une fonction
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
// Crée une fonction generer() qui retourne un mot de passe de 12 caractères

console.log(generer());
console.log(generer());
`,

    12: `// Mission : change la longueur du mot de passe avec une variable
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let longueur = 16;
let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
let mdp = "";
// Utilise la variable longueur dans la boucle

console.log("Longueur : " + longueur);
console.log("Mot de passe : " + mdp);
`};

const missions = {
    1: { title: "Itération 1 : Console", text: "Voici un exemple : <code>console.log('hello world!')</code>.<br>Mission : affiche <strong>Salut + ton prénom !</strong>", check: logs => logs.some(l => l.toLowerCase().includes("salut")) },
    2: { title: "Itération 2 : Variables", text: "Crée une variable <strong>nom</strong> et affiche-la. La sortie doit contenir <strong>JS Academy</strong>.", check: logs => logs.some(l => l.includes("JS Academy")) },
    3: { title: "Itération 3 : Tableaux", text: "Utilise les lettres du tableau pour former le mot <strong>ace</strong> (1ère + 3ème + 5ème lettre).", check: logs => logs.some(l => l.includes("ace")) },
    4: { title: "Itération 4 : Boucle", text: "Affiche les nombres <strong>1 2 3 4 5</strong> avec une boucle for.", check: logs => logs.join(" ").includes("1") && logs.join(" ").includes("5") },
    5: { title: "Itération 5 : Aléatoire", text: "On te donne une fonction magique <strong>randomInt(min, max)</strong>. Modifie les deux nombres dans <strong>randomInt(?, ?)</strong> pour obtenir un nombre entre <strong>10</strong> et <strong>20</strong>.", check: logs => logs.some(l => { const n = parseInt(l.trim()); return n >= 10 && n <= 20; }) },
    6: { title: "Itération 6 : Conditions", text: "Découvre <strong>if / else</strong>. Complète la condition pour que le code affiche <strong>mineur</strong> si age est inférieur à 18, sinon <strong>majeur</strong>.", check: logs => logs.some(l => l.includes("mineur")) || logs.some(l => l.includes("majeur")) },
    7: { title: "Itération 7 : Générateur simple", text: "Génère un mot de passe de <strong>6 lettres minuscules</strong>.", check: logs => logs.some(l => /^[a-z]{6}$/.test(l.trim())) },
    8: { title: "Itération 8 : Majuscules", text: "Génère un mot de passe de <strong>8 caractères</strong> avec des minuscules et des majuscules.", check: logs => logs.some(l => /^[a-zA-Z]{8}$/.test(l.trim()) && /[a-z]/.test(l) && /[A-Z]/.test(l)) },
    9: { title: "Itération 9 : Tous les caractères", text: "Génère un mot de passe de <strong>12 caractères</strong> contenant lettres, chiffres et symboles.", check: logs => logs.some(l => /^[a-zA-Z0-9!@#$%&*]{12}$/.test(l.trim()) && /[a-z]/.test(l) && /[A-Z]/.test(l) && /[0-9]/.test(l) && /[!@#$%&*]/.test(l)) },
    10: { title: "Itération 10 : HTML", text: "Modifie la zone de droite avec <strong>document.getElementById('out')</strong>.", check: (logs, html) => html.toLowerCase().includes("bravo") },
    11: { title: "Itération 11 : Fonction", text: "Crée une fonction <strong>generer()</strong> et affiche deux mots de passe.", check: logs => logs.filter(l => /^[a-zA-Z0-9!@#$%&*]{12,}$/.test(l.trim())).length >= 2 },
    12: { title: "Itération 12 : Longueur variable", text: "Utilise une variable <strong>longueur</strong> pour choisir la taille du mot de passe.", check: logs => logs.some(l => l.toLowerCase().includes("longueur")) && logs.some(l => /^[a-zA-Z0-9!@#$%&*]{10,}$/.test(l.trim())) }
};

const itSelect = document.getElementById("it");
const codeEl = document.getElementById("code");
const outEl = document.getElementById("out");
const mTitle = document.getElementById("m-title");
const mText = document.getElementById("m-text");
const progressEl = document.getElementById("progress");
const savedEl = document.getElementById("saved");

// Fill select + progress dots
for (let i = 1; i <= 12; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = missions[i].title;
    itSelect.appendChild(opt);

    const dot = document.createElement("div");
    dot.className = "dot";
    dot.dataset.it = i;
    progressEl.appendChild(dot);
}

function storageKey(n) { return "tp_laposte_code_" + n; }
function doneKey(n) { return "tp_laposte_done_" + n; }

function loadIt(n) {
    n = parseInt(n);
    itSelect.value = n;
    const saved = localStorage.getItem(storageKey(n));
    codeEl.value = saved !== null ? saved : baseCode[n];
    mTitle.textContent = missions[n].title;
    mText.innerHTML = missions[n].text;
    clearOut();
    updateProgress();
}

function saveIt(n) {
    localStorage.setItem(storageKey(n), codeEl.value);
    savedEl.classList.add("show");
    setTimeout(() => savedEl.classList.remove("show"), 1200);
}

function saveCurrent() {
    saveIt(parseInt(itSelect.value));
}

function resetIt() {
    const n = parseInt(itSelect.value);
    if (confirm("Revenir au code de départ de l'itération ?")) {
        codeEl.value = baseCode[n];
        saveIt(n);
    }
}

function clearOut() {
    outEl.innerHTML = '<div class="info">Appuie sur Run pour voir le résultat ici.</div>';
}

function updateProgress() {
    document.querySelectorAll(".dot").forEach(dot => {
        const n = parseInt(dot.dataset.it);
        dot.classList.toggle("done", localStorage.getItem(doneKey(n)) === "1");
    });
}

function showSuccess(n) {
    localStorage.setItem(doneKey(n), "1");
    updateProgress();
}

function run() {
    const n = parseInt(itSelect.value);
    outEl.innerHTML = "";
    const logs = [];
    let htmlChanged = "";

    const fakeConsole = {
        log: (...args) => {
            const line = args.map(String).join(" ");
            logs.push(line);
            outEl.innerHTML += '<div>' + line + '</div>';
        },
        error: (...args) => {
            const line = args.map(String).join(" ");
            logs.push(line);
            outEl.innerHTML += '<div class="err">' + line + '</div>';
        }
    };

    // Intercept innerHTML writes on the output panel to detect HTML missions
    let ownDesc = Object.getOwnPropertyDescriptor(outEl, "innerHTML");
    const originalInnerHTML = ownDesc || Object.getOwnPropertyDescriptor(Element.prototype, "innerHTML");
    Object.defineProperty(outEl, "innerHTML", {
        configurable: true,
        set: function(v) {
            htmlChanged = v;
            originalInnerHTML.set.call(this, v);
        },
        get: function() { return originalInnerHTML.get.call(this); }
    });

    try {
        new Function("console", codeEl.value)(fakeConsole);
        saveIt(n);
    } catch (e) {
        fakeConsole.error("❌ " + e.message);
    }

    Object.defineProperty(outEl, "innerHTML", originalInnerHTML);

    if (missions[n].check(logs, htmlChanged)) {
        showSuccess(n);
        const suite = n < 12 ? " Passe à l'itération " + (n + 1) + "." : " Tu as terminé toutes les itérations.";
        outEl.innerHTML += '<div class="ok">✓ Itération validée, vous pouvez passer à la suivante.' + suite + '</div>';
    }
}

codeEl.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "Enter") run();
});

loadIt(1);
</script>
</body>
</html>
