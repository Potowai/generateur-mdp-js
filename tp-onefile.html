<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP La Poste — Générateur de MDP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --jaune: #FCDD09;
            --jaune-soft: #FFF6B3;
            --bleu: #0A1E3F;
            --bleu-light: #143057;
            --blanc: #FFFFFF;
            --gris: #F4F6F8;
            --text: #1A1F36;
            --muted: #5E6579;
            --ok: #1a7f37;
            --err: #cf222e;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            background: var(--gris);
        }
        header {
            background: var(--bleu);
            color: var(--blanc);
            padding: 14px 22px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 4px solid var(--jaune);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 700;
            flex: 1;
        }
        .brand::before {
            content: '';
            width: 26px;
            height: 26px;
            background: var(--jaune);
            border-radius: 5px;
            display: inline-block;
        }
        select {
            padding: 9px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            background: var(--blanc);
            color: var(--bleu);
            font-weight: 600;
            cursor: pointer;
        }
        button {
            background: var(--jaune);
            color: var(--bleu);
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: transform .15s, filter .15s;
        }
        button:hover { transform: translateY(-1px); filter: brightness(0.95); }
        .saved { font-size: 12px; color: var(--jaune); opacity: 0; transition: opacity .3s; }
        .saved.show { opacity: 1; }
        main { display: flex; flex: 1; min-height: 0; }
        aside {
            width: 320px;
            background: var(--blanc);
            border-right: 1px solid #E2E5EB;
            display: flex;
            flex-direction: column;
        }
        .mission {
            padding: 22px;
            border-bottom: 1px solid #E2E5EB;
        }
        .mission h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            color: var(--bleu);
            margin: 0 0 12px;
        }
        .mission p {
            font-size: 14px;
            line-height: 1.65;
            color: var(--muted);
            margin: 0;
        }
        .mission strong { color: var(--bleu); }
        .progress {
            padding: 18px 22px;
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 5px;
        }
        .dot {
            height: 8px;
            border-radius: 4px;
            background: #E2E5EB;
        }
        .dot.done { background: var(--jaune); }
        .editor-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        textarea {
            flex: 1;
            padding: 18px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 14px;
            border: none;
            resize: none;
            outline: none;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.55;
        }
        .toolbar {
            padding: 10px 16px;
            background: var(--bleu-light);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .toolbar button { background: var(--blanc); }
        .output-wrap {
            width: 360px;
            background: var(--blanc);
            border-left: 1px solid #E2E5EB;
            display: flex;
            flex-direction: column;
        }
        .output-head {
            padding: 16px 18px;
            background: var(--jaune-soft);
            border-bottom: 1px solid #FCE89D;
            font-weight: 700;
            color: var(--bleu);
        }
        #out {
            flex: 1;
            padding: 18px;
            overflow: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        #out div { margin-bottom: 6px; }
        #out .err { color: var(--err); }
        #out .ok { color: var(--ok); font-weight: 600; }
        #out .info { color: var(--muted); font-style: italic; }

        /* Success animation */
        .success-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity .3s;
        }
        .success-overlay.show { opacity: 1; }
        .success-card {
            background: var(--blanc);
            border: 4px solid var(--jaune);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(10,30,63,.25);
            transform: scale(0.8);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
        }
        .success-overlay.show .success-card { transform: scale(1); }
        .success-card .check {
            width: 80px;
            height: 80px;
            background: var(--jaune);
            border-radius: 50%;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--bleu);
        }
        .success-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--bleu);
            margin: 0 0 8px;
        }
        .success-card p { margin: 0; color: var(--muted); font-size: 15px; }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1999;
            pointer-events: none;
            animation: confetti-fall 2.5s ease-out forwards;
        }

        @media (max-width: 900px) {
            aside, .output-wrap { width: 100%; }
            main { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">La Poste Academy</div>
    <select id="it" onchange="loadIt(this.value)"></select>
    <button onclick="run()">▶ Run</button>
    <span class="saved" id="saved">Code sauvegardé ✓</span>
</header>

<main>
    <aside>
        <div class="mission" id="mission">
            <h2 id="m-title">Bienvenue</h2>
            <p id="m-text">Choisis une itération pour commencer.</p>
        </div>
        <div class="progress" id="progress"></div>
    </aside>

    <div class="editor-wrap">
        <textarea id="code" spellcheck="false"></textarea>
        <div class="toolbar">
            <button onclick="resetIt()">↻ Reset</button>
            <button onclick="clearOut()">Effacer sortie</button>
            <span style="color:#fff;font-size:12px;margin-left:auto;">Ctrl+Enter pour exécuter</span>
        </div>
    </div>

    <div class="output-wrap">
        <div class="output-head">Console</div>
        <div id="out"></div>
    </div>
</main>

<div class="success-overlay" id="success">
    <div class="success-card">
        <div class="check">✓</div>
        <h3>Mission réussie !</h3>
        <p id="success-text">Passe à l'itération suivante.</p>
    </div>
</div>

<script>
const baseCode = {
    1: `// Mission : fais dire bonjour à la console
console.log("Bonjour, monde !");`,

    2: `// Mission : crée une variable et affiche-la
let nom = "La Poste";
console.log("Groupe : " + nom);`,

    3: `// Mission : utilise les lettres du tableau pour former le mot "ace"
let lettres = ["a", "b", "c", "d", "e"];
console.log(lettres[0] + lettres[2] + lettres[4]);`,

    4: `// Mission : affiche les nombres de 1 à 5 avec une boucle
for (let i = 1; i <= 5; i++) {
    console.log(i);
}`,

    5: `// Mission : lance un dé (nombre entre 1 et 6)
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
console.log(randomInt(1, 6));`,

    6: `// Mission : génère un mot de passe de 6 lettres minuscules
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let alphabet = "abcdefghijklmnopqrstuvwxyz";
let mdp = "";
for (let i = 0; i < 6; i++) {
    mdp += alphabet[randomInt(0, alphabet.length - 1)];
}
console.log(mdp);`,

    7: `// Mission : mot de passe avec minuscules ET majuscules
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let minuscules = "abcdefghijklmnopqrstuvwxyz";
let majuscules = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let mdp = "";
for (let i = 0; i < 8; i++) {
    if (Math.random() < 0.5) {
        mdp += minuscules[randomInt(0, minuscules.length - 1)];
    } else {
        mdp += majuscules[randomInt(0, majuscules.length - 1)];
    }
}
console.log(mdp);`,

    8: `// Mission : mot de passe avec tous les types de caractères
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
let mdp = "";
for (let i = 0; i < 12; i++) {
    mdp += caracteres[randomInt(0, caracteres.length - 1)];
}
console.log(mdp);`,

    9: `// Mission : modifie la zone de droite avec du HTML
let out = document.getElementById("out");
out.innerHTML = '<div class="ok">Bravo, tu maîtrises le HTML !</div>';`,

    10: `// Mission : génère deux mots de passe avec une fonction
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
function generer() {
    let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
    let mdp = "";
    for (let i = 0; i < 12; i++) {
        mdp += caracteres[randomInt(0, caracteres.length - 1)];
    }
    return mdp;
}
console.log(generer());
console.log(generer());`,

    11: `// Mission : change la longueur du mot de passe avec une variable
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
let longueur = 16;
let caracteres = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
let mdp = "";
for (let i = 0; i < longueur; i++) {
    mdp += caracteres[randomInt(0, caracteres.length - 1)];
}
console.log("Longueur : " + longueur);
console.log("Mot de passe : " + mdp);`
};

const missions = {
    1: { title: "Itération 1 : Console", text: "Écris ton premier <strong>console.log</strong>. Affiche le texte <strong>Bonjour, monde !</strong> dans la console de droite.", check: logs => logs.some(l => l.toLowerCase().includes("bonjour")) },
    2: { title: "Itération 2 : Variables", text: "Crée une variable <strong>nom</strong> et affiche-la. La sortie doit contenir <strong>La Poste</strong>.", check: logs => logs.some(l => l.includes("La Poste")) },
    3: { title: "Itération 3 : Tableaux", text: "Utilise les lettres du tableau pour former le mot <strong>ace</strong> (1ère + 3ème + 5ème lettre).", check: logs => logs.some(l => l.includes("ace")) },
    4: { title: "Itération 4 : Boucle", text: "Affiche les nombres <strong>1 2 3 4 5</strong> avec une boucle for.", check: logs => logs.join(" ").includes("1") && logs.join(" ").includes("5") },
    5: { title: "Itération 5 : Aléatoire", text: "Utilise <strong>randomInt(1, 6)</strong> pour lancer un dé. Le résultat doit être entre 1 et 6.", check: logs => logs.some(l => /^[1-6]$/.test(l.trim())) },
    6: { title: "Itération 6 : Générateur simple", text: "Génère un mot de passe de <strong>6 lettres minuscules</strong>.", check: logs => logs.some(l => /^[a-z]{6}$/.test(l.trim())) },
    7: { title: "Itération 7 : Majuscules", text: "Génère un mot de passe de <strong>8 caractères</strong> avec des minuscules et des majuscules.", check: logs => logs.some(l => /^[a-zA-Z]{8}$/.test(l.trim()) && /[a-z]/.test(l) && /[A-Z]/.test(l)) },
    8: { title: "Itération 8 : Tous les caractères", text: "Génère un mot de passe de <strong>12 caractères</strong> contenant lettres, chiffres et symboles.", check: logs => logs.some(l => /^[a-zA-Z0-9!@#$%&*]{12}$/.test(l.trim()) && /[a-z]/.test(l) && /[A-Z]/.test(l) && /[0-9]/.test(l) && /[!@#$%&*]/.test(l)) },
    9: { title: "Itération 9 : HTML", text: "Modifie la zone de droite avec <strong>document.getElementById("out")</strong>.", check: (logs, html) => html.toLowerCase().includes("bravo") },
    10: { title: "Itération 10 : Fonction", text: "Crée une fonction <strong>generer()</strong> et affiche deux mots de passe.", check: logs => logs.filter(l => /^[a-zA-Z0-9!@#$%&*]{12,}$/.test(l.trim())).length >= 2 },
    11: { title: "Itération 11 : Longueur variable", text: "Utilise une variable <strong>longueur</strong> pour choisir la taille du mot de passe.", check: logs => logs.some(l => l.toLowerCase().includes("longueur")) && logs.some(l => /^[a-zA-Z0-9!@#$%&*]{10,}$/.test(l.trim())) }
};

const itSelect = document.getElementById("it");
const codeEl = document.getElementById("code");
const outEl = document.getElementById("out");
const mTitle = document.getElementById("m-title");
const mText = document.getElementById("m-text");
const progressEl = document.getElementById("progress");
const savedEl = document.getElementById("saved");

// Fill select + progress dots
for (let i = 1; i <= 11; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = "It. " + i;
    itSelect.appendChild(opt);

    const dot = document.createElement("div");
    dot.className = "dot";
    dot.dataset.it = i;
    progressEl.appendChild(dot);
}

function storageKey(n) { return "tp_laposte_code_" + n; }
function doneKey(n) { return "tp_laposte_done_" + n; }

function loadIt(n) {
    n = parseInt(n);
    itSelect.value = n;
    const saved = localStorage.getItem(storageKey(n));
    codeEl.value = saved !== null ? saved : baseCode[n];
    mTitle.textContent = missions[n].title;
    mText.innerHTML = missions[n].text;
    clearOut();
    updateProgress();
}

function saveIt(n) {
    localStorage.setItem(storageKey(n), codeEl.value);
    savedEl.classList.add("show");
    setTimeout(() => savedEl.classList.remove("show"), 1200);
}

function resetIt() {
    const n = parseInt(itSelect.value);
    if (confirm("Revenir au code de départ de l'itération ?")) {
        codeEl.value = baseCode[n];
        saveIt(n);
    }
}

function clearOut() {
    outEl.innerHTML = '<div class="info">Appuie sur Run pour voir le résultat ici.</div>';
}

function updateProgress() {
    document.querySelectorAll(".dot").forEach(dot => {
        const n = parseInt(dot.dataset.it);
        dot.classList.toggle("done", localStorage.getItem(doneKey(n)) === "1");
    });
}

function showSuccess(n) {
    localStorage.setItem(doneKey(n), "1");
    updateProgress();

    const overlay = document.getElementById("success");
    const text = document.getElementById("success-text");
    text.textContent = n < 11
        ? "Passe maintenant à l'itération " + (n + 1) + " !"
        : "Tu as terminé toutes les itérations. Félicitations !";
    overlay.classList.add("show");

    // confetti
    for (let i = 0; i < 40; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["#FCDD09", "#0A1E3F", "#ffffff", "#E94560"][Math.floor(Math.random() * 4)];
        c.style.animationDelay = Math.random() * 0.5 + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 2600);
    }

    setTimeout(() => overlay.classList.remove("show"), 2200);
}

function run() {
    const n = parseInt(itSelect.value);
    saveIt(n);
    outEl.innerHTML = "";
    const logs = [];
    let htmlChanged = "";

    const fakeConsole = {
        log: (...args) => {
            const line = args.map(String).join(" ");
            logs.push(line);
            outEl.innerHTML += '<div>' + line + '</div>';
        },
        error: (...args) => {
            const line = args.map(String).join(" ");
            logs.push(line);
            outEl.innerHTML += '<div class="err">' + line + '</div>';
        }
    };

    const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, "innerHTML");
    Object.defineProperty(outEl, "innerHTML", {
        set: function(v) {
            htmlChanged = v;
            originalInnerHTML.set.call(this, v);
        },
        get: function() { return originalInnerHTML.get.call(this); }
    });

    try {
        new Function("console", codeEl.value)(fakeConsole);
    } catch (e) {
        fakeConsole.error("❌ " + e.message);
    }

    Object.defineProperty(outEl, "innerHTML", originalInnerHTML);

    if (missions[n].check(logs, htmlChanged)) {
        outEl.innerHTML += '<div class="ok">✓ Mission réussie !</div>';
        showSuccess(n);
    }
}

codeEl.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "Enter") run();
});

codeEl.addEventListener("input", () => saveIt(parseInt(itSelect.value)));

loadIt(1);
</script>
</body>
</html>
