<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Générateur — TP JavaScript</title>
    <style>
        /* ===== STYLE SIMPLE (tu peux le modifier !) ===== */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #09090b;
            color: #fafafa;
            padding: 20px;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 4px;
        }
        .sub {
            color: #a1a1aa;
            font-size: 13px;
            margin: 0 0 24px;
        }
        /* Toggle */
        .toggle {
            display: flex;
            gap: 4px;
            background: #09090b;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 24px;
        }
        .toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #a1a1aa;
            transition: .15s;
        }
        .toggle button.on {
            background: #18181b;
            color: #fafafa;
        }
        .toggle button:not(.on):hover { color: #fafafa; }
        /* Résultat */
        .resultat {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 10px;
            padding: 18px;
            font-size: 18px;
            font-family: monospace;
            word-break: break-all;
            min-height: 56px;
            line-height: 1.5;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        /* Options */
        .opt { margin-bottom: 20px; }
        .opt label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .opt label span { color: #22c55e; font-weight: 700; }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #27272a;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #fafafa;
            border: 3px solid #18181b;
            cursor: pointer;
        }
        .hint {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a1a1aa;
            margin-top: 6px;
        }
        /* Cases à cocher stylées */
        .grp {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .grp label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            font-size: 13px;
            color: #a1a1aa;
            cursor: pointer;
            transition: .15s;
        }
        .grp label:has(input:checked) {
            border-color: #22c55e;
            color: #fafafa;
        }
        .grp input { display: none; }
        /* Boutons */
        .actions { display: flex; gap: 8px; }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .15s;
        }
        .btn-prim {
            background: #fafafa;
            color: #09090b;
        }
        .btn-prim:hover { opacity: .85; }
        .btn-sec {
            background: transparent;
            border: 1px solid #27272a;
            color: #fafafa;
        }
        .btn-sec:hover { background: #27272a; }
        .msg {
            font-size: 13px;
            color: #a1a1aa;
            min-height: 20px;
            text-align: center;
            margin: 14px 0 0;
        }
        .msg.ok { color: #22c55e; }
        .msg.err { color: #ef4444; }
        @media (max-width: 460px) {
            .card { padding: 20px; }
            .grp { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="card">

    <h1>🔐 Générateur</h1>
    <p class="sub">Le projet que tu as construit pendant le TP</p>

    <!-- Choisis le mode -->
    <div class="toggle">
        <button id="BoutonMdp" class="on" onclick="mode='mdp'; rafraichir();">Mot de passe</button>
        <button id="BoutonPhrase" onclick="mode='phrase'; rafraichir();">Phrase de passe</button>
    </div>

    <!-- Résultat -->
    <div class="resultat" id="Resultat">Clique sur Générer</div>

    <!-- Options mot de passe -->
    <div id="optMdp">
        <div class="opt">
            <label>Longueur <span id="LabelLongueur">12</span></label>
            <input type="range" id="SliderLongueur" min="6" max="128" value="12" oninput="majSlider()">
            <div class="hint"><span>6</span><span>128</span></div>
        </div>
        <div class="grp">
            <label><input type="checkbox" id="CheckBoxMajuscules" checked onchange="generer()"><span>A–Z</span></label>
            <label><input type="checkbox" id="CheckBoxChiffres" checked onchange="generer()"><span>0–9</span></label>
            <label><input type="checkbox" id="CheckBoxSymboles" checked onchange="generer()"><span>!@#$%&amp;*</span></label>
        </div>
    </div>

    <!-- Options phrase de passe -->
    <div id="optPhrase" style="display:none">
        <div class="opt">
            <label>Nombre de mots <span id="LabelMots">4</span></label>
            <input type="range" id="SliderMots" min="2" max="8" value="4" oninput="majSlider()">
            <div class="hint"><span>2</span><span>8</span></div>
        </div>
        <div class="grp">
            <label><input type="checkbox" id="CheckBoxPhraseMajuscules" checked onchange="generer()"><span>Majuscule 1ère lettre</span></label>
            <label><input type="checkbox" id="CheckBoxPhraseNombres" onchange="generer()"><span>+ chiffre à la fin</span></label>
        </div>
    </div>

    <!-- Boutons -->
    <div class="actions">
        <button class="btn btn-prim" onclick="generer()">Générer</button>
        <button class="btn btn-sec" onclick="copier()">Copier</button>
    </div>

    <p class="msg" id="Message"></p>

</div>

<script>
// ============================================================
// Ton code du TP ! Tu reconnais randomInt ? 😊
// ============================================================

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ----- Dictionnaire pour les phrases de passe -----
// (tu peux ajouter tes propres mots !)
const mots = [
    "soleil","lune","etoile","nuage","pluie","vent","feu","terre","mer",
    "montagne","riviere","foret","chemin","jardin","fleur","arbre","pierre",
    "sable","glace","feuille","ciel","arc","fleche","pont","tour","chateau",
    "porte","clef","lampe","miroir","livre","table","chaise","fenetre",
    "mur","toit","escalier","salle","cuisine","bureau","ecole","cahier",
    "stylo","crayon","gomme","regle","sac","balle","jeu","film","musique",
    "danse","chant","fete","amour","ami","coeur","reve","sage","fort",
    "doux","libre","grand","petit","long","clair","frais","pur","vrai",
    "beau","bon","neuf","vif","calme","chaud","triste","gai","jeune",
    "vieux","pauvre","riche","simple","noble","digne","fier","juste",
    "hardi","loyal","brave","fin","vague","brume","orage","lutin","geant",
    "sorcier","elfe","dragon","phoenix","licorne","aigle","hibou","renard",
    "loup","ours","biche","chat","chien","lion","tigre","paon","cygne",
    "abeille","papillon","escargot","ecureuil","lapin","baleine","dauphin",
    "requin","pieuvre","crabe","phoque","pingouin"
];
// Il y a 110 mots ici. Essaie d'en ajouter d'autres !

// ----- Variables -----
let mode = "mdp"; // "mdp" ou "phrase"

// ----- Fonction : générer un mot de passe -----
function genererMdp() {
    let minuscules = "abcdefghijklmnopqrstuvwxyz";
    let majuscules = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let chiffres = "0123456789";
    let symboles = "!@#$%&*";
    let tout = minuscules + majuscules + chiffres + symboles;

    // 💡 ASTUCE SIMPLE : on met 1 caractère de chaque type coché
    // au début du mot de passe, comme ça on est SÛR qu'il y en a.
    //
    //   let mdp = "";
    //
    //   if (chkMaj.checked)
    //       mdp += majuscules[randomInt(0, majuscules.length - 1)];
    //   if (chkChiffres.checked)
    //       mdp += chiffres[randomInt(0, chiffres.length - 1)];
    //   if (chkSymboles.checked)
    //       mdp += symboles[randomInt(0, symboles.length - 1)];
    //
    //   // Remplir le reste avec tous les caractères
    //   let reste = longueur - mdp.length;
    //   for (let i = 0; i < reste; i++) {
    //       mdp += tout[randomInt(0, tout.length - 1)];
    //   }
    //
    // Essaye ! Copie ce code juste en dessous en changeant
    // les noms des cases (document.getElementById(...)).

    let longueur = parseInt(document.getElementById("SliderLongueur").value);
    let mdp = "";

    // Boucle : on pioche au hasard (tu reconnais ?)
    // Ecris le code ici pour générer le mot de passe
    mdp = "Modifie ce code pour générer ton mot de passe !";
    document.getElementById("Resultat").textContent = mdp;
}

// ----- Fonction : générer une phrase de passe -----
function genererPhrase() {
    let nb = parseInt(document.getElementById("SliderMots").value);
    let capital = document.getElementById("CheckBoxPhraseMajuscules").checked;
    let chiffre = document.getElementById("CheckBoxPhraseNombres").checked;

    let liste = [];
    for (let i = 0; i < nb; i++) {
        let mot = mots[randomInt(0, mots.length - 1)];
        if (capital && i === 0) {
            mot = mot.charAt(0).toUpperCase() + mot.slice(1);
        }
        liste.push(mot);
    }

    let phrase = liste.join("-");
    if (chiffre) phrase += randomInt(0, 99);

    document.getElementById("Resultat").textContent = phrase;
}

// ----- Fonction principale -----
function generer() {
    if (mode === "mdp") genererMdp();
    else genererPhrase();
    document.getElementById("Message").textContent = "";
}

// ----- Mise à jour des sliders -----
function majSlider() {
    document.getElementById("LabelLongueur").textContent = document.getElementById("SliderLongueur").value;
    document.getElementById("LabelMots").textContent = document.getElementById("SliderMots").value;
    generer();
}

// ----- Changer de mode -----
function rafraichir() {
    document.getElementById("BoutonMdp").className = mode === "mdp" ? "on" : "";
    document.getElementById("BoutonPhrase").className = mode === "phrase" ? "on" : "";
    document.getElementById("optMdp").style.display = mode === "mdp" ? "" : "none";
    document.getElementById("optPhrase").style.display = mode === "phrase" ? "" : "none";
    generer();
}

// ----- Copier dans le presse-papiers -----
function copier() {
    let txt = document.getElementById("resultat").textContent;
    if (!txt || txt === "Clique sur Générer") return;
    navigator.clipboard.writeText(txt).then(() => {
        let m = document.getElementById("Message");
        m.textContent = "Copié !";
        m.className = "msg ok";
        setTimeout(() => { m.textContent = ""; m.className = "msg"; }, 2000);
    });
}

// ----- C'est parti ! -----
generer();
</script>
</body>
</html>
