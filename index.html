<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Mots de Passe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🔐 Générateur de Mots de Passe</h1>

        <!-- Affichage du résultat en temps réel -->
        <div class="resultat" id="resultat">Clique sur Générer</div>

        <!-- Options -->
        <div class="options">
            <label for="slider">Longueur : <span id="longueurAffichage">12</span></label>
            <input type="range" id="slider" min="6" max="24" value="12">
        </div>

        <!-- Boutons -->
        <button id="bouton">Générer</button>
        <button id="copier" class="btn-secondaire">Copier</button>

        <!-- Petite zone d'aide / messages pour les élèves -->
        <p id="message" class="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
